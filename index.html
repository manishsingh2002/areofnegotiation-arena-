      good:{verdict:'Calculated nuisance pricing.',color:'good',points:100,text:'You showed teeth (prepared to litigate/invalidate) but acknowledged the reality: the distraction costs money. By offering a strict, time-bound "nuisance fee" far below their anchor, you priced the *inconvenience* of the lawsuit, not the *validity* of their claim.',lesson:['Patent trolls rely on the asymmetric cost of litigation. Price your settlement based on your cost of distraction, not their fake damages.','Always make settlement offers time-bound to force the troll to take the guaranteed quick cash.','Acknowledge your own constraints (the IPO) on your own terms, stripping it of its blackmail power.'],say:'"We are fully prepared to litigate. However, avoiding distraction has internal value. We offer a one-time ₹1.5Cr nuisance fee to dismiss, valid for 48 hours."'},
      ok:{verdict:'Principled, but highly risky.',color:'ok',points:40,text:'Fighting extortion is morally correct. However, you are 3 months from an IPO. An active IP lawsuit injunction will require a massive disclosure in your S-1 filing, spooking retail investors and potentially tanking your valuation by hundreds of crores. You won the battle but might lose the war.',lesson:['In high-stakes corporate finance, being "right" in court is often more expensive than a calculated settlement.']},
      bad:{verdict:'You fed the beast.',color:'bad',points:0,text:'You instantly panicked and confirmed that their leverage (the IPO delay) works perfectly. By offering ₹5Cr immediately, you just funded their entire law firm for a year. They will likely push for ₹10Cr now, knowing you are terrified of the injunction.',lesson:['Never confirm the counterpart\'s leverage over you. Never offer millions in settlement without aggressively challenging the premise of their claim first.']}
    }
  },
  {
    tier: 3, tag:'sales', tagClass:'tag-sales', difficulty:5,
    title:'The Master Services Squeeze',
    context:'A massive Fortune 500 company is ready to sign a ₹20Cr contract. But their legal department sends back a redlined Master Services Agreement (MSA).',
    them:{name:'Diana Prince',role:'VP Legal Counsel',bg:'#171717',fg:'#D4D4D8',initials:'DP'},
    you:{name:'You',role:'CEO, Apex CRM',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'We cannot accept your liability caps. For a vendor handling our data, we require uncapped liability, source code escrow in case you go bankrupt, and a Net-90 day payment term. Non-negotiable.'}],
    options:[
      {text:'"Net-90 and Source Escrow are heavy, but we can accept them if you agree to keep the liability capped at 2x the annual contract value. Uncapped liability is a non-starter for our insurance."',quality:'good',letter:'A'},
      {text:'"These terms are completely non-standard for a SaaS company. We cannot accept uncapped liability or source code escrow under any circumstances."',quality:'ok',letter:'B'},
      {text:'"Because this is such a strategic partnership for us, we will accept the redlines to get the deal closed this quarter."',quality:'bad',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Strategic concession trading.',color:'good',points:100,text:'Enterprise legal teams always ask for the moon ("uncapped liability") expecting you to push back. By conceding on the cash flow (Net-90) and the operational paranoia (Escrow), you bought the leverage to kill the one term that could actually bankrupt your company (uncapped liability).',lesson:['Never accept uncapped liability. It makes your company un-investable and un-acquirable.','In heavy legal negotiations, isolate the "company-killer" clauses and trade minor operational annoyances (like payment terms) to defeat them.','Use your insurance policy as the objective bad guy: "Our cyber-liability policy prohibits uncapped exposure."'],say:'"Net-90 and Source Escrow are heavy, but we can accept them if you agree to keep liability capped at 2x the contract value. Uncapped is a non-starter for our insurance."'},
      ok:{verdict:'A wall of friction.',color:'ok',points:30,text:'You held the line on the right things, but by blanket-rejecting everything as "non-standard," you gave their legal team nothing to report back as a "win." Enterprise lawyers need to justify their existence. If you don\'t give them a minor victory, they will block the deal.',lesson:['Always give enterprise legal teams a minor, harmless victory so they can feel they protected their company.']},
      bad:{verdict:'Corporate suicide.',color:'bad',points:0,text:'Accepting uncapped liability means if they suffer a breach remotely connected to your software, they can sue you for billions, instantly destroying your company. Accepting Source Code escrow without strict release conditions means they essentially own your IP. You just sold your company\'s soul for a single contract.',lesson:['Never let sales urgency override foundational legal protection. A bad enterprise MSA can literally end your business.']}
    }
  },
  {
    tier: 3, tag:'conflict', tagClass:'tag-conflict', difficulty:5,
    title:'The Vendor Monopoly',
    context:'Your entire software relies on a specific mapping API provided by a massive tech monopoly. They send an automated email.',
    them:{name:'Automated Notice',role:'Monopoly API Provider',bg:'#0F172A',fg:'#38BDF8',initials:'API'},
    you:{name:'You',role:'CTO',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'Effective in 30 days, we are restructuring our API pricing tiers. Based on your volume, your monthly cost will increase from ₹2L/mo to ₹18L/mo. Click here to accept the new Terms of Service.'}],
    options:[
      {text:'"This is price gouging. We will be migrating off your platform immediately and issuing a public press release about your predatory business practices."',quality:'bad',letter:'A'},
      {text:'"We cannot absorb a 900% increase in 30 days. We need an emergency 6-month enterprise transition agreement at ₹5L/mo to either optimize our API calls or complete a migration."',quality:'good',letter:'B'},
      {text:'"We literally cannot afford this. If you force this pricing, our startup will go bankrupt. Is there any legacy tier we can stay on for a few more months?"',quality:'ok',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Buying time against a monopoly.',color:'good',points:100,text:'You cannot "beat" a monopoly that doesn\'t care about you. Your only goal is buying time. By proposing a specific, temporary "transition agreement" at a higher (but survivable) rate, you give their account reps a way to classify you in their system, buying you 6 months to rewrite your codebase to use a different API.',lesson:['When facing a true monopoly, you have no leverage. Do not threaten; negotiate for *time*, not price.','Propose a specific, temporary contractual bridge (e.g., "Enterprise Transition Tier").','Never accept a 900% dependency cost increase. Use the bought time to aggressively build an alternative.'],say:'"We cannot absorb a 900% increase in 30 days. We require an emergency 6-month transition agreement at ₹5L/mo to either optimize our volume or migrate."'},
      ok:{verdict:'Begging the machine.',color:'ok',points:20,text:'Pleading poverty to a trillion-dollar company does not work. They do not care if your startup dies; you are a rounding error on their spreadsheet. Asking for a "legacy tier" is a weak, open-ended question that will likely get a canned "No" from a low-level support rep.',lesson:['Massive corporations do not respond to pity. They respond to structured, systematic requests that fit into their procedural boxes.']},
      bad:{verdict:'Empty threats against a giant.',color:'bad',points:0,text:'Threatening a press release against a monopoly is laughable. They survive antitrust hearings; they don\'t care about your tweet. By declaring you are migrating immediately, you ensure they will shut off your API access on day 31, breaking your product before you have time to actually build the alternative.',lesson:['Never make aggressive threats against a counterparty that holds the power to instantly destroy your product.']}
    }
  },

  // TIER 4: BLACK SWAN EVENTS
  {
    tier: 4, tag:'legal', tagClass:'tag-conflict', difficulty:5,
    title:'The Whistleblower Extortion',
    context:'A disgruntled early employee threatens a PR crisis right before your massive Series C funding closes.',
    them:{name:'Anonymous Email',role:'Ex-Employee',bg:'#4C0519',fg:'#FB7185',initials:'EX'},
    you:{name:'You',role:'CEO',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'I have 400 internal emails from 2023 showing we ignored data privacy protocols to scale faster. If I don\'t get a ₹5Cr "retroactive bonus" wired by tomorrow, TechCrunch gets the zip file.'}],
    options:[
      {text:'"We can\'t afford a PR disaster right before the Series C. We will wire the ₹5Cr, but you have to sign an ironclad, permanent non-disparagement agreement."',quality:'bad',letter:'A'},
      {text:'"You signed an NDA. If you leak those, we will sue you into bankruptcy and ensure you never work in tech again."',quality:'ok',letter:'B'},
      {text:'"We take privacy seriously and audited those 2023 protocols ourselves. I am briefing the board on this threat now. We will offer ₹20L as a strict nuisance settlement with a bulletproof NDA. Decline, and our GC files an extortion injunction by 5 PM."',quality:'good',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Front-running the crisis.',color:'good',points:100,text:'You stripped them of their leverage (the element of surprise) by front-running the threat to your board. By offering a tiny, legally binding nuisance fee tied to an injunction threat, you re-framed their "leak" from a noble whistleblowing act to documented criminal extortion.',lesson:['Blackmail only works in the dark. Neutralize threats by immediately briefing your stakeholders so the "secret" loses its power.','Never pay massive extortion demands; it guarantees they will come back for more. Offer a small nuisance settlement backed by a severe legal threat.'],say:'"I am briefing the board on this threat now. We offer ₹20L as a strict nuisance settlement. Decline, and our GC files an extortion injunction by 5 PM."'},
      ok:{verdict:'A dangerous game of chicken.',color:'ok',points:40,text:'Threatening to sue them enforces the NDA, but if they are genuinely disgruntled, they might leak the files anyway just to watch you burn. By not offering a small exit bridge (nuisance fee), you back them into a corner where their only option is mutually assured destruction.',lesson:['Cornering a desperate person often triggers the exact catastrophic action you are trying to avoid. Leave them a small, face-saving exit.']},
      bad:{verdict:'Funding your own demise.',color:'bad',points:0,text:'You just paid ₹5Cr to a blackmailer. An NDA won\'t protect you; if they leaked once, they will leak again when they run out of money. Furthermore, your Series C investors will uncover a sudden, unexplainable ₹5Cr wire in due diligence and pull the term sheet anyway.',lesson:['Paying massive extortion demands makes you a permanent target and violates your fiduciary duty to your shareholders.']}
    }
  },
  {
    tier: 4, tag:'gov', tagClass:'tag-board', difficulty:5,
    title:'The Regulatory Shakedown',
    context:'A hostile government regulator suddenly halts your core product\'s operation under a new, vague data law.',
    them:{name:'Joint Secretary',role:'Ministry of Data',bg:'#0F172A',fg:'#38BDF8',initials:'GOV'},
    you:{name:'You',role:'CEO',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'Your routing module violates Section 9 of the new Data Sovereignty Act. We are freezing your operations pending a ₹20Cr fine and full surrender of your proprietary source code for "compliance auditing".'}],
    options:[
      {text:'"This is massive government overreach. Section 9 does not apply to our architecture. We will see you in federal court, and we are ignoring the operational freeze."',quality:'bad',letter:'A'},
      {text:'"We will pay the ₹20Cr fine to lift the operational freeze immediately, but we will absolutely fight the source code surrender in court to protect our IP."',quality:'ok',letter:'B'},
      {text:'"We share the Ministry\'s goal of protecting citizen data. Surrendering proprietary IP is impossible, but we will construct a secure, isolated "sandbox" for your auditors and co-author a public Data Safety Standard to highlight the Ministry\'s leadership here."',quality:'good',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Judo-flipping the bureaucracy.',color:'good',points:100,text:'Regulators are driven by optics and political wins, not just money. By offering to co-author a standard, you gave the bureaucrat a massive public PR victory. By offering a "sandbox" audit, you appeared completely transparent while mathematically preventing them from stealing your source code.',lesson:['Never fight a government regulator on pure logic; fight them on optics. Give them a political win that costs you nothing.','Never hand over raw source code to a government. Offer "black box" sandbox audits to simulate transparency without risking IP.'],say:'"We share your goals. Surrendering IP is impossible, but we will construct a secure sandbox for your auditors and co-author a public safety standard to highlight your leadership."'},
      ok:{verdict:'Bleeding cash to survive.',color:'ok',points:30,text:'Refusing the source code surrender is mandatory, but paying a ₹20Cr fine immediately without negotiating sets a precedent that your company is an ATM for the government. They will find a new "violation" next year.',lesson:['Paying maximum government fines instantly makes you a target for future shakedowns. Negotiate the fine by offering compliance initiatives instead.']},
      bad:{verdict:'You fought the law, and the law won.',color:'bad',points:0,text:'Telling a government regulator you are ignoring their freeze is corporate suicide. They will send police to your data centers to physically seize your servers, arrest your executives, and permanently revoke your business licenses. You cannot out-litigate the state.',lesson:['Never openly defy a direct regulatory freeze. Compliance optics are required for survival.']}
    }
  },
  {
    tier: 4, tag:'rival', tagClass:'tag-ma', difficulty:5,
    title:'The Stolen Roadmap',
    context:'A massive competitor has obtained your unreleased roadmap. Their CEO calls you, gloating, offering a hostile buyout.',
    them:{name:'Victor Thorne',role:'CEO, GlobalTech',bg:'#171717',fg:'#D4D4D8',initials:'VT'},
    you:{name:'You',role:'Founder',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'We acquired your Q4 product roadmap from a mutual "friend." We are building all of it with 10x your engineers, launching next month. You\'re dead in the water. I\'ll buy your company right now for ₹50Cr before you go to zero.'}],
    options:[
      {text:'"We know exactly who leaked that, and we have the audit logs to prove it. If you build those features, we will tie you up in IP litigation for a decade."',quality:'ok',letter:'A'},
      {text:'"I\'m surprised your team is wasting cycles on that abandoned Q4 decoy. But more importantly, you just confessed to receiving stolen trade secrets over a recorded line. If you launch those, our injunction freezes your platform. The price to acquire us just went to ₹250Cr."',quality:'good',letter:'B'},
      {text:'"If you actually have the roadmap, we can\'t compete with your engineering headcount. We will accept the ₹50Cr offer to protect our investors\' capital."',quality:'bad',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Lethal counter-strike.',color:'good',points:100,text:'You neutralized his technological advantage by implying the roadmap was a fake decoy, injecting doubt into his engineering plan. Then, you weaponized his own arrogance: he admitted to corporate espionage. You instantly flipped the leverage and 5x\'d his anchor price.',lesson:['When an opponent uses stolen information, cast immediate doubt on the validity of that information to paralyze their execution.','Arrogance is a weakness. When a rival gloats about unethical behavior, immediately document it and use the legal liability as extreme leverage.'],say:'"I\'m surprised you\'re building that abandoned decoy. More importantly, you just confessed to receiving stolen trade secrets. The price to acquire us just went up to ₹250Cr."'},
      ok:{verdict:'A standard legal defense.',color:'ok',points:40,text:'Threatening IP litigation is the standard playbook, but software features are notoriously hard to copyright. If they build it using "clean room" engineering, your lawsuit might fail, and they will still crush you in the market. You didn\'t attack his confidence.',lesson:['Threatening a lawsuit is expected. To win a hostile standoff, you must attack their psychological confidence in their own strategy.']},
      bad:{verdict:'Total capitulation.',color:'bad',points:0,text:'You instantly folded to a bully. Even if they have your roadmap, executing software is entirely different from planning it. By accepting the lowball, you rewarded their corporate espionage and robbed your investors of massive upside.',lesson:['Never surrender your company based on a competitor\'s threat to out-build you. Execution is harder than stealing a PDF.']}
    }
  }
];

let current=0, totalScore=0, answered=false;
const scoreHistory=[];

function initHome() {
  document.getElementById('home-subtitle').innerHTML = `Master the psychological frameworks of high-stakes corporate warfare.<br>27 scenarios. 4 Elite Tiers.`;
  
  const listDiv = document.getElementById('dynamic-scenario-list');
  let listHtml = '';
  
  // Group scenarios by Tier
  const tier1 = scenarios.filter(s => s.tier === 1);
  const tier2 = scenarios.filter(s => s.tier === 2);
  const tier3 = scenarios.filter(s => s.tier === 3);
  const tier4 = scenarios.filter(s => s.tier === 4);

  const buildTier = (tierData, title) => {
    let html = `<div class="tier-section">
                  <div class="tier-header"><span>${title}</span> <span class="tier-count">${tierData.length} Scenarios</span></div>
                  <div class="scenario-list">`;
    tierData.forEach((s) => {
      let diffLabel = s.difficulty <= 2 ? 'Easy' : (s.difficulty <= 3 ? 'Medium' : (s.difficulty === 4 ? 'Hard' : 'Expert'));
      const overallIndex = scenarios.indexOf(s) + 1;
      html += `
        <div class="sl-item">
          <div class="sl-num">${overallIndex}</div>
          <div>
            <div class="sl-title">${s.title}</div>
            <div class="sl-meta"><span class="${s.tagClass}" style="color:inherit; border:none; padding:0; background:transparent;">${s.tag}</span> • ${diffLabel}</div>
          </div>
        </div>
      `;
    });
    html += `</div></div>`;
    return html;
  };

  listHtml += buildTier(tier1, "Tier 1: Tactical Foundation");
  listHtml += buildTier(tier2, "Tier 2: The Corporate Arena");
  listHtml += buildTier(tier3, "Tier 3: The Executive Boardroom");
  listHtml += buildTier(tier4, "Tier 4: Black Swan Events");

  listDiv.innerHTML = listHtml;
}

window.onload = initHome;

function startGame(){
  document.getElementById('home-screen').style.display='none';
  document.getElementById('game-screen').style.display='block';
  renderScene();
  window.scrollTo(0,0);
}

function renderScene(){
  const s=scenarios[current];
  answered=false;
  document.getElementById('next-btn').disabled=true;
  document.getElementById('scene-counter').textContent=`Scenario ${current+1} of ${scenarios.length} (Tier ${s.tier})`;
  const pct=((current)/scenarios.length)*100;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=`${current} / ${scenarios.length}`;

  let diffLabel = s.difficulty <= 2 ? 'Easy' : (s.difficulty <= 3 ? 'Medium' : (s.difficulty === 4 ? 'Hard' : 'Expert'));
  let dots='';
  for(let i=0;i<5;i++) {
    const onClass = i < s.difficulty ? ' on' : '';
    dots += `<div class="diff-dot${onClass}"></div>`;
  }
  dots += `<div class="diff-label">${diffLabel}</div>`;

  let chatHtml='';
  s.chat.forEach(m=>{
    if(m.speaker==='them'){
      chatHtml+=`<div><div class="bubble-name">${s.them.name}</div><div class="speech-bubble bubble-them">${m.text}</div></div>`;
    } else {
      chatHtml+=`<div><div class="bubble-name-r">You</div><div class="speech-bubble bubble-you">${m.text}</div></div>`;
    }
  });

  let optsHtml='';
  s.options.forEach((o,i)=>{
    optsHtml+=`<button class="opt-btn" id="opt-${i}" onclick="choose(${i})"><span class="opt-letter">${o.letter}</span><span>${o.text}</span></button>`;
  });

  document.getElementById('scenario-area').innerHTML=`
    <div class="scenario-card">
      <div class="scene-banner">
        <div><span class="scene-tag ${s.tagClass}">${s.tag}</span></div>
        <div class="scene-difficulty">${dots}</div>
        <div class="scene-title">${s.title}</div>
        <div class="scene-context">${s.context}</div>
      </div>
      <div class="chars">
        <div class="char">
          <div class="char-avatar" style="background:${s.them.bg};color:${s.them.fg}">${s.them.initials}</div>
          <div class="char-info"><div class="char-name">${s.them.name}</div><div class="char-role">${s.them.role}</div></div>
        </div>
        <span class="vs">vs</span>
        <div class="char">
          <div class="char-avatar" style="background:${s.you.bg};color:${s.you.fg}">${s.you.initials}</div>
          <div class="char-info"><div class="char-name">${s.you.name}</div><div class="char-role">${s.you.role}</div></div>
        </div>
      </div>
      <div class="situation">
        <div class="situation-label">The situation</div>
        ${chatHtml}
      </div>
      <div class="options-section">
        <div class="options-label">What is your strategic move?</div>
        ${optsHtml}
      </div>
      <div class="analysis" id="analysis-box"></div>
    </div>
  `;
}

function choose(i){
  if(answered) return;
  answered=true;
  const s=scenarios[current];
  const chosen=s.options[i];
  const analysis=s.analysis[chosen.quality];

  s.options.forEach((o,j)=>{
    const btn=document.getElementById('opt-'+j);
    btn.disabled=true;
    if(o.quality==='good') btn.classList.add('reveal-good');
    else if(o.quality==='bad') btn.classList.add('reveal-bad');
    else btn.classList.add('reveal-ok');
    
    if(j===i){
      btn.classList.add(`chosen-${o.quality}`);
    }
  });

  const pts=analysis.points;
  totalScore+=pts;
  scoreHistory.push({scenario:s.title,quality:chosen.quality,points:pts});
  document.getElementById('score-display').textContent=totalScore;

  const colorMap={good:'verdict-good',ok:'verdict-ok',bad:'verdict-bad'};
  const iconMap={good:'✓',ok:'→',bad:'✗'};
  
  let lessonsHtml=analysis.lesson.map(l=>`<div class="lesson-row"><div class="lesson-dot"></div><div>${l}</div></div>`).join('');
  let sayHtml=analysis.say?`<div class="what-to-say"><div class="wts-label">The Executive Delivery</div><div class="wts-text">${analysis.say}</div></div>`:'';

  const qualityText = chosen.quality === 'good' ? 'Expert' : (chosen.quality === 'ok' ? 'Compromise' : 'Fatal');
  const formattedPts = pts > 0 ? '+' + pts : pts;

  const box=document.getElementById('analysis-box');
  box.innerHTML=`
    <div class="points-earned">${formattedPts} points · ${qualityText} Move</div>
    <div class="analysis-verdict ${colorMap[analysis.color]}"><span class="verdict-icon">${iconMap[analysis.color]}</span><strong>${analysis.verdict}</strong><br><br>${analysis.text}</div>
    <div class="analysis-lesson"><div class="lesson-label">Strategic Framework</div><div class="lesson-rows">${lessonsHtml}</div></div>
    ${sayHtml}
  `;
  
  box.classList.add('show');
  document.getElementById('next-btn').disabled=false;
  document.getElementById('next-btn').textContent=current<scenarios.length-1?'Next Scenario →':'Review Final Debrief →';
  
  setTimeout(() => {
    box.scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 100);
}

function nextScene(){
  current++;
  if(current>=scenarios.length){ showResults(); return; }
  
  document.getElementById('prog-fill').style.width=((current)/scenarios.length*100)+'%';
  document.getElementById('prog-text').textContent=`${current} / ${scenarios.length}`;
  renderScene();
  window.scrollTo({top:0, behavior:'smooth'});
}

function showResults(){
  document.getElementById('game-screen').style.display='none';
  const rs=document.getElementById('results-screen');
  rs.style.display='block';

  const maxScore=scenarios.length*100;
  const pct=Math.round((totalScore/maxScore)*100);
  
  let grade, gradeSub;
  if(pct>=90){grade='Apex Negotiator';gradeSub='You control the frame, neutralize aggressive anchors, and navigate boardroom warfare with lethal precision. You are ready for the executive table.';}
  else if(pct>=70){grade='Strategic Operator';gradeSub='Strong tactical instincts. You survive the corporate arena, but occasionally concede leverage against extreme pressure. Review the Tier 3 and Tier 4 analysis.';}
  else if(pct>=50){grade='Compromiser';gradeSub='You rely on splitting the difference and logical arguments. In high-stakes environments, you are leaving massive equity and revenue on the table.';}
  else{grade='Liability';gradeSub='You negotiate emotionally. You react to anchors, issue empty threats, and fail to secure mechanical leverage. Study the fundamental frameworks immediately.';}

  const goods=scoreHistory.filter(x=>x.quality==='good').length;
  const oks=scoreHistory.filter(x=>x.quality==='ok').length;
  const bads=scoreHistory.filter(x=>x.quality==='bad').length;

  const weakOnes = scoreHistory.filter(x => x.quality !== 'good').map(x => {
    const feedbackText = x.quality === 'ok' ? 'Weak compromise' : 'Fatal error';
    return `<div class="ri-row"><div class="ri-icon">→</div><div>${x.scenario} <span style="color:#666">(${feedbackText})</span></div></div>`;
  }).join('');

  const insightsHtml = weakOnes 
    ? `<div class="results-insights"><div class="ri-title">Critical Failures & Compromises</div>${weakOnes}</div>` 
    : `<div class="results-insights" style="border-color:#10B981;"><div class="ri-title" style="color:#10B981;">Perfect Execution</div><div style="color:#A7F3D0; font-size:14px;">Every strategic decision was flawless. A rare achievement.</div></div>`;

  rs.innerHTML=`
    <div style="font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem;">Final Assessment</div>
    <div class="results-score">${totalScore}</div>
    <div style="font-size:16px;color:#888;margin-bottom:3rem;font-weight:600;letter-spacing:0.05em;">${totalScore} / ${maxScore} POINTS · ${pct}%</div>
    
    <div class="results-grade">${grade}</div>
    <div class="results-sub">${gradeSub}</div>
    
    <div class="results-breakdown">
      <div class="rb-card" style="background:rgba(16, 185, 129, 0.1); color:#34D399; border-color:rgba(16, 185, 129, 0.2);">
        <div class="rb-num">${goods}</div>
        <div class="rb-lbl">Expert</div>
      </div>
      <div class="rb-card" style="background:rgba(59, 130, 246, 0.1); color:#60A5FA; border-color:rgba(59, 130, 246, 0.2);">
        <div class="rb-num">${oks}</div>
        <div class="rb-lbl">Compromise</div>
      </div>
      <div class="rb-card" style="background:rgba(239, 68, 68, 0.1); color:#F87171; border-color:rgba(239, 68, 68, 0.2);">
        <div class="rb-num">${bads}</div>
        <div class="rb-lbl">Fatal</div>
      </div>
    </div>
    
    ${insightsHtml}
    
    <div class="action-btns">
      <button class="restart-btn" onclick="restartGame()">Re-enter the Arena</button>
    </div>
  `;
  window.scrollTo({top:0, behavior:'smooth'});
}

function restartGame(){
  current=0; totalScore=0; scoreHistory.length=0; answered=false;
  document.getElementById('results-screen').style.display='none';
  document.getElementById('game-screen').style.display='block';
  document.getElementById('score-display').textContent='0';
  renderScene();
  window.scrollTo({top:0, behavior:'smooth'});
}

</script>
</body>
</html>
