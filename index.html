<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Negotiation Masterclass</title>
<style>
/* BASE STYLES */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #f5f4f0; min-height: 100vh; line-height: 1.5; }
.shell { max-width: 760px; margin: 0 auto; padding: 2rem 1rem 5rem; }

/* HEADER */
.hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; background: #151515; padding: 1.5rem; border-radius: 16px; border: 1px solid #2a2a2a; }
.hdr-left h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
.hdr-left p { font-size: 13px; color: #888; margin-top: 4px; }
.score-box { text-align: right; }
.score-num { font-size: 28px; font-weight: 700; color: #fff; }
.score-lbl { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: .08em; }

/* PROGRESS */
.progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
.prog-bar { flex: 1; height: 6px; background: #222; border-radius: 6px; overflow: hidden; }
.prog-fill { height: 100%; background: #4F46E5; border-radius: 6px; transition: width .4s cubic-bezier(0.4, 0, 0.2, 1); }
.prog-text { font-size: 12px; color: #888; white-space: nowrap; font-weight: 600; }

/* SCENARIO CARD */
.scenario-card { background: #151515; border: 1px solid #2a2a2a; border-radius: 16px; overflow: hidden; margin-bottom: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

.scene-banner { padding: 24px; border-bottom: 1px solid #222; }
.scene-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; padding: 4px 12px; border-radius: 20px; margin-bottom: 16px; }
.tag-sales { background: #1E1B4B; color: #818CF8; border: 1px solid #312E81; }
.tag-salary { background: #064E3B; color: #34D399; border: 1px solid #065F46; }
.tag-vendor { background: #451A03; color: #FBBF24; border: 1px solid #78350F; }
.tag-partner { background: #0F172A; color: #38BDF8; border: 1px solid #1E293B; }
.tag-conflict { background: #4C0519; color: #FB7185; border: 1px solid #881337; }
.tag-ma { background: #2E1065; color: #C084FC; border: 1px solid #4C1D95; }
.tag-board { background: #171717; color: #D4D4D8; border: 1px solid #3F3F46; }

.scene-difficulty { display: flex; gap: 4px; margin-bottom: 16px; align-items: center; }
.diff-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
.diff-dot.on { background: #4F46E5; box-shadow: 0 0 8px rgba(79, 70, 229, 0.6); }
.diff-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-left: 6px; font-weight: 600;}

.scene-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; color: #fff; }
.scene-context { font-size: 15px; color: #a1a1aa; line-height: 1.65; }

/* CHARACTERS */
.chars { display: flex; gap: 16px; padding: 16px 24px; border-bottom: 1px solid #222; background: #0f0f0f; align-items: center; flex-wrap: wrap; }
.char { display: flex; align-items: center; gap: 12px; }
.char-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1); }
.char-name { font-size: 14px; font-weight: 600; color: #fff; }
.char-role { font-size: 12px; color: #888; }
.vs { font-size: 12px; color: #444; font-weight: 700; margin: 0 4px; text-transform: uppercase; }

/* SITUATION */
.situation { padding: 24px; border-bottom: 1px solid #222; }
.situation-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #666; margin-bottom: 16px; }
.speech-bubble { border-radius: 12px; padding: 16px; font-size: 15px; line-height: 1.6; margin-bottom: 16px; position: relative; }
.bubble-them { background: #1e1e1e; color: #e4e4e7; border-radius: 12px 12px 12px 4px; border: 1px solid #2a2a2a; }
.bubble-you { background: #4F46E5; color: #fff; border-radius: 12px 12px 4px 12px; text-align: right; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
.bubble-name { font-size: 11px; font-weight: 600; color: #888; margin-bottom: 6px; }
.bubble-name-r { font-size: 11px; font-weight: 600; color: #888; margin-bottom: 6px; text-align: right; }

/* OPTIONS */
.options-section { padding: 24px; background: #111; }
.options-label { font-size: 12px; font-weight: 600; color: #888; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
.opt-btn { width: 100%; text-align: left; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 16px; font-size: 15px; color: #d4d4d8; cursor: pointer; margin-bottom: 12px; transition: all .2s ease; line-height: 1.6; display: flex; gap: 16px; align-items: flex-start; font-family: inherit; }
.opt-btn:last-child { margin-bottom: 0; }
.opt-btn:hover:not(:disabled) { background: #222; border-color: #555; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.4); }
.opt-btn:disabled { cursor: default; }
.opt-letter { width: 28px; height: 28px; border-radius: 6px; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 2px; transition: all .2s; color: #888; }
.opt-btn.chosen-good .opt-letter { background: #10B981; color: #fff; }
.opt-btn.chosen-bad .opt-letter { background: #EF4444; color: #fff; }
.opt-btn.chosen-ok .opt-letter { background: #3B82F6; color: #fff; }
.opt-btn.reveal-good { background: rgba(16, 185, 129, 0.1); border-color: #10B981; border-width: 1px; color: #fff; }
.opt-btn.reveal-bad { background: rgba(239, 68, 68, 0.05); border-color: #7f1d1d; opacity: 0.6; }
.opt-btn.reveal-ok { background: rgba(59, 130, 246, 0.1); border-color: #3B82F6; color: #fff; }

/* ANALYSIS */
.analysis { display: none; padding: 24px; border-top: 1px solid #222; background: #151515; animation: slideIn .4s cubic-bezier(0.16, 1, 0.3, 1); }
.analysis.show { display: block; }
@keyframes slideIn { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: none } }
.analysis-verdict { border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; font-size: 15px; line-height: 1.6; border: 1px solid transparent; }
.verdict-good { background: rgba(16, 185, 129, 0.1); color: #A7F3D0; border-color: rgba(16, 185, 129, 0.2); border-left: 4px solid #10B981; }
.verdict-ok { background: rgba(59, 130, 246, 0.1); color: #BFDBFE; border-color: rgba(59, 130, 246, 0.2); border-left: 4px solid #3B82F6; }
.verdict-bad { background: rgba(239, 68, 68, 0.1); color: #FECACA; border-color: rgba(239, 68, 68, 0.2); border-left: 4px solid #EF4444; }
.verdict-icon { font-size: 18px; margin-right: 10px; font-weight: bold; }
.analysis-lesson { background: #0a0a0a; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.lesson-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #4F46E5; margin-bottom: 12px; }
.lesson-rows { display: flex; flex-direction: column; gap: 12px; }
.lesson-row { display: flex; gap: 12px; font-size: 14px; color: #d4d4d8; line-height: 1.6; }
.lesson-dot { width: 6px; height: 6px; border-radius: 50%; background: #4F46E5; flex-shrink: 0; margin-top: 8px; }
.what-to-say { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 16px; position: relative; overflow: hidden; }
.what-to-say::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: #6366F1; }
.wts-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #888; margin-bottom: 10px; }
.wts-text { font-size: 16px; color: #fff; line-height: 1.6; font-style: italic; font-weight: 500; }
.points-earned { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; padding: 8px 16px; border-radius: 30px; background: #222; color: #fff; margin-bottom: 20px; border: 1px solid #333; }

/* NEXT BTN */
.next-wrap { text-align: center; padding: 20px; }
.next-btn { background: #4F46E5; color: #fff; border: none; border-radius: 12px; padding: 16px 40px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all .2s; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3); }
.next-btn:hover:not(:disabled) { background: #4338CA; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4); }
.next-btn:disabled { opacity: .3; cursor: default; background: #333; box-shadow: none; color: #888; }

/* RESULTS SCREEN */
.results-screen { display: none; background: #151515; border: 1px solid #2a2a2a; border-radius: 16px; padding: 4rem 2rem; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
.results-screen.show { display: block; }
.results-score { font-size: 80px; font-weight: 800; margin: 1rem 0 .5rem; color: #fff; letter-spacing: -2px; }
.results-grade { font-size: 26px; font-weight: 700; margin-bottom: 1rem; color: #4F46E5; }
.results-sub { font-size: 16px; color: #a1a1aa; margin-bottom: 3rem; line-height: 1.6; max-width: 500px; margin-left: auto; margin-right: auto; }
.results-breakdown { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 3rem; }
.rb-card { border-radius: 16px; padding: 24px; border: 1px solid transparent; }
.rb-num { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
.rb-lbl { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.results-insights { text-align: left; border-top: 1px solid #2a2a2a; padding-top: 3rem; margin-bottom: 3rem; }
.ri-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #fff; text-transform: uppercase; letter-spacing: 0.05em; }
.ri-row { display: flex; gap: 12px; margin-bottom: 12px; font-size: 14px; color: #a1a1aa; line-height: 1.6; background: #1a1a1a; padding: 12px 16px; border-radius: 8px; border: 1px solid #222; }
.ri-icon { flex-shrink: 0; width: 16px; font-weight: bold; color: #EF4444; }
.action-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.restart-btn { background: #4F46E5; color: #fff; border: none; border-radius: 12px; padding: 16px 40px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all .2s; }
.restart-btn:hover { background: #4338CA; transform: translateY(-2px); }

/* HOME SCREEN */
.home { text-align: center; padding: 3rem 0; }
.home-title { font-size: 42px; font-weight: 800; margin-bottom: 1rem; color: #fff; letter-spacing: -1px; }
.home-sub { font-size: 18px; color: #a1a1aa; margin-bottom: 3rem; line-height: 1.6; }

.tier-section { margin-bottom: 3rem; text-align: left; }
.tier-header { font-size: 14px; font-weight: 700; color: #4F46E5; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
.tier-count { background: #222; color: #888; padding: 2px 8px; border-radius: 12px; font-size: 11px; }

.scenario-list { display: grid; grid-template-columns: 1fr; gap: 12px; }
.sl-item { background: #151515; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 20px; transition: all 0.2s; cursor: default; }
.sl-item:hover { border-color: #444; transform: translateX(4px); background: #1a1a1a; }
.sl-num { width: 40px; height: 40px; border-radius: 8px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; color: #888; border: 1px solid #333; }
.sl-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: #e4e4e7; }
.sl-meta { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.sl-meta span { padding: 2px 8px; border-radius: 4px; background: #222; margin-right: 6px; }

.start-wrap { position: sticky; bottom: 20px; padding: 20px 0; text-align: center; background: linear-gradient(transparent, #0a0a0a 40%); margin-top: 2rem; }
.start-btn { background: #4F46E5; color: #fff; border: none; border-radius: 16px; padding: 20px 60px; font-size: 18px; font-weight: 800; cursor: pointer; transition: all .2s; box-shadow: 0 10px 30px rgba(79, 70, 229, 0.4); text-transform: uppercase; letter-spacing: 0.05em; }
.start-btn:hover { background: #4338CA; transform: translateY(-3px); box-shadow: 0 15px 40px rgba(79, 70, 229, 0.6); }

/* CUSTOM TOAST NOTIFICATION */
.toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 16px 32px; border-radius: 12px; font-size: 15px; font-weight: 600; box-shadow: 0 20px 40px rgba(0,0,0,0.4); transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; text-align: center; max-width: 90%; }
.toast.show { bottom: 40px; }

/* RESPONSIVE DESIGN */
@media (max-width: 600px) {
  .results-breakdown { grid-template-columns: 1fr; }
  .chars { flex-direction: column; align-items: flex-start; gap: 16px; }
  .vs { display: none; }
  .sl-item { padding: 16px; gap: 12px; }
  .sl-num { width: 32px; height: 32px; font-size: 14px; }
}
</style>
</head>
<body>
<div class="shell">

<!-- HOME -->
<div id="home-screen">
<div class="home">
  <h1 class="home-title">The Apex Negotiator</h1>
  <p class="home-sub" id="home-subtitle">Loading masterclass...</p>
  
  <div id="dynamic-scenario-list">
    <!-- Tiers auto-populate via JS -->
  </div>
  
  <div class="start-wrap">
    <button class="start-btn" onclick="startGame()">Enter the Arena</button>
  </div>
</div>
</div>

<!-- GAME -->
<div id="game-screen" style="display:none;">
  <div class="hdr">
    <div class="hdr-left"><h1>The Arena</h1><p id="scene-counter">Scenario 1</p></div>
    <div class="score-box"><div class="score-num" id="score-display">0</div><div class="score-lbl">Score</div></div>
  </div>
  <div class="progress-row">
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-text" id="prog-text">0</div>
  </div>
  <div id="scenario-area"></div>
  <div class="next-wrap"><button class="next-btn" id="next-btn" onclick="nextScene()" disabled>Next scenario →</button></div>
</div>

<!-- RESULTS -->
<div id="results-screen" class="results-screen"></div>

<!-- CUSTOM TOAST -->
<div id="toast-msg" class="toast"></div>

</div>

<script>
const scenarios=[
  // TIER 1: TACTICAL FOUNDATION
  {
    tier: 1, tag:'sales', tagClass:'tag-sales', difficulty:2,
    title:'The Deflection',
    context:'You just finished a great demo for a mid-market trading company. You propose ₹25,000/mo. The owner immediately counters with an aggressive lowball to test you.',
    them:{name:'Arjun Mehta',role:'Owner, Mehta Traders',bg:'#1E1B4B',fg:'#818CF8',initials:'AM'},
    you:{name:'You',role:'Founder, Apex CRM',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'The demo looks good. But ₹25,000 a month is absurd for our margins. We can do ₹10,000, maximum. Take it or leave it.'}],
    options:[
      {text:'"₹10,000 isn\'t possible. Our lowest tier is ₹18,000. I can\'t go below that without losing money."',quality:'bad',letter:'A'},
      {text:'"I hear that ₹25,000 feels high. If we look at the ₹10,000 number—is that a hard ceiling on your department\'s cash flow, or is it a question of the ROI you\'re expecting to see?"',quality:'good',letter:'B'},
      {text:'"If ₹10,000 is your maximum, we can do that, but we will have to severely limit your API access and remove dedicated support."',quality:'ok',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Expert pivot.',color:'good',points:100,text:'You used a calibrated question to diagnose the real problem before responding to the surface number. ₹10,000 is either a real budget constraint OR a tactical anchor. You cannot know which until you ask. By labeling their anchor instead of reacting to it, you maintain control.',lesson:['Never respond to an extreme anchor with a counter-offer. It legitimizes their fake number.','Use tactical empathy: acknowledge their constraint, then ask a calibrated "How" or "What" question to uncover the underlying motivation.','Discovery question → constraint revealed → response. Always in that order.'],say:'"I hear that ₹25,000 feels high. Help me understand—is ₹10,000 a hard cap on monthly cash flow, or is it a question of the ROI you expect?"'},
      ok:{verdict:'Safe, but defensive.',color:'ok',points:40,text:'Stripping out features to match a price (variable expansion) is a valid tactic, but you deployed it too early. You don\'t even know why he said ₹10,000 yet. You just taught him that aggressively lowballing you instantly unlocks massive discounts, even if it costs him features.',lesson:['Unbundling features is a good defense, but it must be used AFTER discovering their true constraints, not as a panic response.']},
      bad:{verdict:'You lost the frame.',color:'bad',points:0,text:'You just dropped your price by ₹7,000 instantly without getting a single concession. You also complained about "losing money," which a buyer does not care about. You negotiated against yourself.',lesson:['Never justify your price by complaining about your own costs. The buyer only cares about their value, not your margins.']}
    }
  },
  {
    tier: 1, tag:'sales', tagClass:'tag-sales', difficulty:3,
    title:'The Competitor Trap',
    context:'You are pitching a staffing agency. They like you, but they are trying to commoditize your software by comparing you to a massive, cheaper legacy player.',
    them:{name:'Priya Sharma',role:'Director, PS Staffing',bg:'#064E3B',fg:'#34D399',initials:'PS'},
    you:{name:'You',role:'Founder, Apex CRM',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'Zoho CRM does most of this for ₹4,000 a month. Your price is ₹15,000. That\'s nearly 4x the cost. Justify that premium to me.'}],
    options:[
      {text:'"You\'re right, they are cheaper. We can match closer to that. Let me see what I can do at ₹8,000."',quality:'bad',letter:'A'},
      {text:'"Zoho is a generic global CRM. It wasn\'t built for complex Indian compliance or staffing workflows. Let me show you exactly where our features beat theirs."',quality:'ok',letter:'B'},
      {text:'"That\'s a fair comparison; they are a massive company. Before I answer—what are the 2 or 3 things that actually matter most to you in making this switch? I want to make sure I\'m answering the right question."',quality:'good',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Masterful redirection.',color:'good',points:100,text:'You didn\'t defend your price OR attack the competitor. You redirected to what she actually values. If she says "HRMS compliance," you win easily. If she says "price," you have a real ROI conversation. You cannot fight the right battle until you know which battlefield you\'re on.',lesson:['Competitor price comparisons are usually a test of your conviction, not a literal request to price-match.','By asking what matters most, you let the prospect define their own buying criteria—then you simply show how you meet them.'],say:'"That\'s a fair comparison. Before I answer—what are the 2 or 3 things that actually matter most to you in making this switch?"'},
      ok:{verdict:'Decent, but falls into the feature trap.',color:'ok',points:55,text:'Positioning against their weakness is correct, but you are now in a feature-comparison war. Legacy players have thousands of features; they can always find one you lack. You are also assuming you know what she cares about.',lesson:['Never lead with your features and hope they match the client\'s needs. Lead with their needs, then map your features to them.']},
      bad:{verdict:'A tragic collapse.',color:'bad',points:0,text:'You have no idea what the competitor\'s cheap plan actually includes—it\'s likely a stripped-down trap. You just cut your price by 46% based on an unverified claim. You have signaled zero confidence in your product.',lesson:['Matching price instantly signals that price is your only differentiator—the absolute weakest position to be in.']}
    }
  },
  {
    tier: 1, tag:'career', tagClass:'tag-salary', difficulty:3,
    title:'The Pre-emptive Raise',
    context:'You are a top-performing Director of Engineering. You reduced AWS costs by 30% and shipped 4 massive features. Market rate for your role is ₹40L. You make ₹28L. You initiate a meeting with the VP.',
    them:{name:'Vikram Singh',role:'VP of Engineering',bg:'#451A03',fg:'#FBBF24',initials:'VS'},
    you:{name:'You',role:'Director of Engineering',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'You asked for a 1-on-1 about compensation. Things are tight right now across the industry, but tell me what\'s on your mind.'}],
    options:[
      {text:'"I know budgets are tight. I was hoping maybe we could look at a small bump? Even getting to ₹32L would make a big difference for me."',quality:'bad',letter:'A'},
      {text:'"I\'ve done some market research and the standard rate for my role is ₹40L. I\'d like to discuss a plan to close that gap over the next two quarters."',quality:'ok',letter:'B'},
      {text:'"I\'d like to adjust my base salary to ₹40L. Over the last year, my team reduced infrastructure costs by 30% and shipped the core Q3 roadmap. Based on that execution and current market data, I believe ₹40L is the correct alignment."',quality:'good',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Flawless anchoring.',color:'good',points:100,text:'You anchored first with a specific number. You justified it with internal ROI (AWS savings) AND external validation (market data). Most importantly, you didn\'t ask a question—you stated a declarative business case. You controlled the frame perfectly.',lesson:['Always name your number first. Whoever anchors first controls the cognitive range of the negotiation.','Connect your number to two unassailable facts: verifiable internal ROI and external market data.','State your ask as a declarative sentence, not a request for permission.'],say:'"I\'d like to adjust my base salary to ₹40L. Based on the 30% infrastructure savings we executed and current market alignment, I believe that is the correct number."'},
      ok:{verdict:'Good data, weak execution.',color:'ok',points:60,text:'Referencing market data is strong. But "closing the gap over two quarters" negotiates against yourself. You just gave him permission to delay your raise for 6 months. You did the research; force the decision now.',lesson:['Do not offer phased timelines or compromises before the other side pushes back. Make the firm ask first.']},
      bad:{verdict:'Desperation masked as politeness.',color:'bad',points:0,text:'"Small bump," "if possible," "even ₹32L" — every word is a concession. You anchored at ₹32L (your absolute floor) before the conversation even began. You sounded like you were asking for a charity handout, not presenting a business case for a highly valuable asset.',lesson:['Hedging language ("small," "if possible," "maybe") destroys your professional leverage. Walk in as an equal.']}
    }
  },
  {
    tier: 1, tag:'vendor', tagClass:'tag-vendor', difficulty:2,
    title:'The "Quick Favor" Scope Creep',
    context:'You are an agency building a custom platform for ₹10L. 4 days before launch, the client emails you asking for a "fast" major addition.',
    them:{name:'Sanya Ali',role:'Marketing Director',bg:'#0F172A',fg:'#38BDF8',initials:'SA'},
    you:{name:'You',role:'Agency Owner',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'Hey! Platform looks amazing. Can we quickly add a custom lead-scoring algorithm that syncs with Salesforce? Should be a fast tweak before Friday\'s launch, right?'}],
    options:[
      {text:'"Happy to scope that out. Since a Salesforce integration is outside the original Statement of Work, would you prefer to swap it with the analytics module to hit Friday, or add it as a Phase 2 add-on with a separate budget?"',quality:'good',letter:'A'},
      {text:'"That\'s actually a complex integration. I can\'t do that for free, it\'s going to cost at least ₹2L more and delay the launch."',quality:'ok',letter:'B'},
      {text:'"Sure, since we are so close to launch and want to keep you happy, I\'ll get my team to work late and squeeze it in."',quality:'bad',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Brilliant boundary setting.',color:'good',points:100,text:'You maintained a collaborative tone ("Happy to scope that out") while firmly identifying the request as out-of-scope. By offering a choice (swap vs. pay), you enforce the iron triangle of project management (time, budget, scope) without ever using the word "No".',lesson:['Never just say "no" to scope creep. Say "Yes, and here is how it impacts the budget/timeline."','Giving the client a choice puts the responsibility of the constraint back on them.','Use the Statement of Work as the objective "bad guy" to remove personal friction.'],say:'"Happy to scope that out. Since it is outside the original SOW, would you prefer to swap it with an existing module, or add it as a Phase 2 add-on with a separate budget?"'},
      ok:{verdict:'Direct, but overly defensive.',color:'ok',points:50,text:'You correctly identified that the work shouldn\'t be free. However, your response is adversarial ("I can\'t do that for free"). It challenges her assumption by telling her she\'s wrong ("actually a complex integration"). This creates unnecessary friction.',lesson:['Don\'t argue about how "hard" a task is. To a client, everything looks easy. Argue based on scope, not difficulty.']},
      bad:{verdict:'You trained them to abuse you.',color:'bad',points:0,text:'By saying yes to "just squeeze it in," you confirmed her suspicion that your timeline was padded and your time is cheap. You guaranteed a stressful weekend for your team and guaranteed she will ask for more free tweaks next week.',lesson:['If you do free work, the client doesn\'t value the work more—they value your time less.']}
    }
  },
  {
    tier: 1, tag:'sales', tagClass:'tag-sales', difficulty:3,
    title:'The "No Budget" Brush-off',
    context:'You just had an incredible demo with a VP. The software perfectly solves a massive bottleneck costing them lakhs per week. Then, he drops a roadblock.',
    them:{name:'Siddharth Rao',role:'VP of Operations',bg:'#4C0519',fg:'#FB7185',initials:'SR'},
    you:{name:'You',role:'Founder, Apex CRM',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'This looks great. Unfortunately, our Q3 budget is completely frozen. Reach out to me again in January when new budgets open up.'}],
    options:[
      {text:'"What if I give you a massive 40% discount to squeeze it into any discretionary budget you might have left this quarter?"',quality:'bad',letter:'A'},
      {text:'"Understood. Usually when budget is frozen but a problem is urgent, our clients start implementation now with the billing entirely deferred to Q1. Does resolving the bottleneck before January justify exploring that structure?"',quality:'good',letter:'B'},
      {text:'"I completely understand. I will set a calendar reminder to follow up with you in the first week of January to get this moving!"',quality:'ok',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Creative deal structuring.',color:'good',points:100,text:'"No budget" usually means "no cash flow allocated right now." It rarely means they don\'t want the product. By offering deferred billing, you solve his cash flow constraint while solving his operational problem immediately. It tests if "budget" is a real constraint or a polite lie.',lesson:['Separate the decision to buy from the schedule of payment.','Deferred billing preserves the value of your product, whereas panic discounting destroys it.','Always test a stall to see if it\'s a polite rejection or a real logistical constraint.'],say:'"Usually when budget is frozen but the problem is urgent, clients implement now with billing deferred to Q1. Does resolving the bottleneck before January justify exploring that?"'},
      ok:{verdict:'You survived, but lost momentum.',color:'ok',points:30,text:'You respected his timeline, but you lost the deal momentum. By January, the operational pain might have shifted, a competitor might have stepped in, or Siddharth might have quit. You accepted a 3-month delay without fighting for the deal.',lesson:['Time kills all deals. A prospect who is hot today will be lukewarm in 3 months.','"Follow up next quarter" is the most common polite lie in B2B sales.']},
      bad:{verdict:'Reeks of desperation.',color:'bad',points:0,text:'You instantly offered a 40% discount for a problem that wasn\'t even about price—it was about timing. Siddharth now knows your product is massively overpriced. Furthermore, if his budget is truly frozen, a discount doesn\'t help him. You ruined your pricing credibility for nothing.',lesson:['Never discount to solve a timing problem.']}
    }
  },
  {
    tier: 1, tag:'creator', tagClass:'tag-partner', difficulty:3,
    title:'The Influencer Lowball',
    context:'Your highly-niche finance page has 80k followers but an insane 8% engagement rate. A massive fintech app wants a sponsored reel. You charge ₹50,000.',
    them:{name:'Rohan Malhotra',role:'Marketing Head, FinEdge',bg:'#2E1065',fg:'#C084FC',initials:'RM'},
    you:{name:'You',role:'Finance Creator',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'We love the page. We typically pay ₹15,000–₹20,000 for posts in the 80k follower range. Let\'s get a contract going?'}],
    options:[
      {text:'"Our standard rate is ₹40,000. But we could do ₹30,000 if you commit to two posts instead of one."',quality:'ok',letter:'A'},
      {text:'"The ₹15–20k range makes sense for average follower counts. However, our engagement rate is 8%—roughly 4x the industry average. For your specific demographic, this guarantees higher conversion than a 300k page. Our rate is ₹50,000."',quality:'good',letter:'B'},
      {text:'"That range works for me, let\'s do ₹20,000!"',quality:'bad',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Perfect counter-anchor.',color:'good',points:100,text:'They opened with an anchor based on a vanity metric (followers). You rejected it, re-framed the metric to actual value delivered (engagement rate), and re-anchored at your target. You proved you understand marketing better than a typical influencer.',lesson:['When someone gives you a range, they are anchoring at the top of it. Treat ₹20k as their ceiling.','Shift the negotiation from the metric where they have leverage (followers) to the metric where you have leverage (engagement/conversion).','Always have a data-backed, objective reason for your rate.'],say:'"The ₹15–20k range makes sense based purely on followers. However, our engagement rate is 8%—4x the average. Our rate is ₹50,000 based on the actual conversions we drive."'},
      ok:{verdict:'Directional, but you negotiated against yourself.',color:'ok',points:40,text:'Upselling to a package deal is smart. However, you immediately offered a massive discount (down to ₹30k) before they even pushed back on your ₹40k anchor. You just showed them your floor without making them work for it.',lesson:['Never offer a discount before they ask for one. State your rate, then be quiet.']},
      bad:{verdict:'You accepted a fake anchor.',color:'bad',points:0,text:'A brand\'s "typical range" is rarely their actual budget; it is an opening anchor designed to test your business acumen. You failed the test. You left ₹30,000 on the table and branded yourself as a cheap commodity.',lesson:['In creator negotiations, brands exploit the creator\'s gratitude. Separate your excitement from your business sense.']}
    }
  },
  {
    tier: 1, tag:'sales', tagClass:'tag-sales', difficulty:2,
    title:'The Free Trial Trap',
    context:'A startup founder has been on your 14-day free trial. On day 13, they email you.',
    them:{name:'Ananya Singh',role:'Startup Founder',bg:'#171717',fg:'#D4D4D8',initials:'AS'},
    you:{name:'You',role:'Founder, Apex CRM',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'Hey! We\'ve been so swamped this week we haven\'t had time to fully test the CRM. Can you extend our free trial for another 30 days?'}],
    options:[
      {text:'"I can absolutely extend it by 7 days to help you out. What specific workflow do you need to test in that time to make a final decision?"',quality:'good',letter:'A'},
      {text:'"Unfortunately, our system policy strictly prohibits extending trials. You\'ll need to upgrade to the paid tier to continue using the platform tomorrow."',quality:'bad',letter:'B'},
      {text:'"Sure thing! I know how crazy startup life is. I\'ve added another 30 days to your account. Let me know if you need help!"',quality:'ok',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Maintains leverage and creates accountability.',color:'good',points:100,text:'You granted a concession (time), but anchored it far below her massive 30-day ask. More importantly, you attached a strict condition: demanding she identify a specific testing goal. This forces her out of passive browsing and into an active buying evaluation.',lesson:['Never give a concession without extracting a commitment in return.','A 30-day extension removes all urgency. A 7-day extension maintains the pressure to act.','People do not value things that are given away easily.'],say:'"I can extend it by 7 days. What specific workflow do you need to test in that timeframe to make a final decision?"'},
      ok:{verdict:'You gave away the farm for free.',color:'ok',points:40,text:'You wanted to build goodwill, but you just taught the founder that your deadlines are fake. If she was "too busy" for 14 days, giving her 30 more days ensures she will put it off for another 29 days. You destroyed all buying urgency.',lesson:['Being overly accommodating in sales often backfires by removing the prospect\'s urgency to solve their own problem.']},
      bad:{verdict:'Unnecessarily hostile and bureaucratic.',color:'bad',points:0,text:'Hiding behind a "system policy" feels cold and corporate, especially to another startup founder. You likely just lost a customer who genuinely was busy and just needed a few days. Strictness without empathy burns bridges.',lesson:['"Company policy" is the weakest, most infuriating reason you can give a customer. As a founder, you own the policy.']}
    }
  },
  {
    tier: 1, tag:'vendor', tagClass:'tag-vendor', difficulty:4,
    title:'The Cloud Bill Squeeze',
    context:'Your AWS bill has grown to ₹2.5L/mo. Azure has just offered you equivalent compute for 35% less. You have a call with your AWS account manager.',
    them:{name:'Neha Kapoor',role:'AWS Account Manager',bg:'#1E1B4B',fg:'#818CF8',initials:'NK'},
    you:{name:'You',role:'CTO, Apex CRM',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'Hi! So you wanted to discuss your account and infrastructure scaling. How can I help you today?'}],
    options:[
      {text:'"We\'ve been evaluating our infrastructure costs. Azure has formally quoted us 35% below our current AWS spend for an equivalent setup. Before we make a hard decision on migrating, I wanted to give AWS the opportunity to retain the account."',quality:'good',letter:'A'},
      {text:'"We\'ve been on AWS for a while now and I think we qualify for some kind of startup or growth credit. Can you check what\'s available to lower our bill?"',quality:'ok',letter:'B'},
      {text:'"We\'ve been happy with AWS but ₹2.5L a month is getting really hard for us to justify to our board. Is there any way to reduce the bill?"',quality:'bad',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Perfect vendor leverage.',color:'good',points:100,text:'You came in with a verified BATNA (Best Alternative To a Negotiated Agreement), named the specific gap (35%), and communicated that a decision is imminent. AWS account managers have massive discount authority, but they only use it to save churning accounts. You gave her the exact ammunition she needs to get her boss to approve your discount.',lesson:['Vendor negotiations require a real alternative, not a bluff. Get the competing quote first, then negotiate.','The phrase "before we make a decision" signals urgency without aggression.','A specific percentage (35%) anchors the discount you need. "Cheaper" is vague; "35% lower" is a target.'],say:'"Azure quoted us 35% below our current spend. Before we make a decision on migrating, I wanted to give AWS the opportunity to retain the account. What can we do?"'},
      ok:{verdict:'Good angle, weak leverage.',color:'ok',points:50,text:'Asking for credits is fine, but you are asking for a favor rather than presenting leverage. Neha will give you whatever the standard, pre-approved credit package is (maybe 10%), which is far less than the 35% you could negotiate using the Azure quote.',lesson:['Credits are discretionary gifts. Competing quotes create retention emergencies. Know the difference.']},
      bad:{verdict:'You telegraphed your weakness.',color:'bad',points:0,text:'"Is there any way to reduce the bill?" tells Neha two things: you want to stay on AWS, and you have no alternatives. You have zero leverage. She will offer a token 5% goodwill gesture, and you will leave lakhs on the table.',lesson:['Never negotiate without a walk-away option. Opening with "is there any way" removes your leverage before the conversation begins.']}
    }
  },

  // TIER 2: THE CORPORATE ARENA
  {
    tier: 2, tag:'sales', tagClass:'tag-sales', difficulty:4,
    title:'The Unbundling Request',
    context:'You are closing a ₹25L annual enterprise deal. The procurement manager is trying to slash the price to fit his strict departmental budget limit.',
    them:{name:'Rajesh Nair',role:'Head of Procurement',bg:'#064E3B',fg:'#34D399',initials:'RN'},
    you:{name:'You',role:'Enterprise Account Exec',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'We really like the software, but my hard budget cap is ₹20L. Just take out the "Premium Support & Implementation" line item and drop the price to ₹20L. We have our own IT guys, we don\'t need it.'}],
    options:[
      {text:'"I can\'t completely remove support because it\'s mandatory, but I can meet you in the middle and give you a straight 15% discount so it\'s closer to your budget."',quality:'ok',letter:'A'},
      {text:'"Okay, if that is the absolute only way to get this deal signed today before the end of the month, we can remove the support package and do ₹20L."',quality:'bad',letter:'B'},
      {text:'"Our Premium Implementation isn\'t just a line item; it is how we guarantee the 99.9% uptime your CTO required. If ₹20L is a hard cap, we need to look at removing user licenses or core modules instead to match that price."',quality:'good',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Protects the product value.',color:'good',points:100,text:'Procurement managers are trained to unbundle services to lower costs without losing software value. By tying the support package directly to a metric their boss (the CTO) demanded, you removed his leverage. Furthermore, you called his bluff: if he truly only has ₹20L, he must sacrifice actual software capability to get it.',lesson:['Never let procurement separate the value from the cost. Tie services directly to the outcomes the ultimate decision-maker demanded.','If they want to pay 20% less, they must get 20% less product. Defend your margins through scope reduction, not discounts.'],say:'"Our Premium Implementation is how we guarantee the 99.9% uptime your CTO required. If ₹20L is a hard cap, we need to look at removing core modules instead to match that price."'},
      ok:{verdict:'A lazy compromise.',color:'ok',points:40,text:'You held the line on keeping support, but you instantly offered a 15% discount for absolutely nothing in return. Rajesh just learned that your initial ₹25L quote was padded, and he will likely push for the full ₹20L now because he smells blood in the water.',lesson:['"Meet you in the middle" is lazy negotiating. It rewards extreme anchors from the buyer.','Never offer a discount without extracting a concession (like a multi-year lock-in or faster payment terms) in return.']},
      bad:{verdict:'You set yourself up for churn.',color:'bad',points:0,text:'You caved instantly. Worse, when the software inevitably has a rocky rollout because their "IT guys" don\'t know your system, they will blame your software, not their procurement manager\'s budget cut. They will churn next year.',lesson:['When you let clients strip away necessary implementation/support services, you guarantee failure. A deal signed at a loss of integrity is worse than a lost deal.']}
    }
  },
  {
    tier: 2, tag:'career', tagClass:'tag-salary', difficulty:4,
    title:'The Low Equity Offer',
    context:'You are a staff engineer interviewing at a high-growth Series A startup. The cash market rate for your base salary is ₹50L. They just sent the offer.',
    them:{name:'Kavita Desai',role:'Startup CEO',bg:'#451A03',fg:'#FBBF24',initials:'KD'},
    you:{name:'You',role:'Staff Engineer',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'We are thrilled to offer you the role. We can only do ₹35L base right now to manage burn, but we are including 0.1% equity. We want true owners here, not just employees!'}],
    options:[
      {text:'"I really need closer to ₹50L to cover my mortgage and living expenses. Is there any flexibility on the base?"',quality:'bad',letter:'A'},
      {text:'"I love the vision and want to be an owner. To make the math work at a ₹35L base, taking on that risk requires 0.5% equity. Alternatively, we can keep the 0.1% equity at the ₹50L market base rate. Which structure works better for your cap table?"',quality:'good',letter:'B'},
      {text:'"I appreciate the offer. The market base for my level is ₹50L. If the base must be capped at ₹35L, I would need a ₹15L sign-on bonus to bridge the gap for year one."',quality:'ok',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Brilliant structural counter.',color:'good',points:100,text:'You didn\'t reject their constraint (cash burn), you embraced it—and priced it. You gave the CEO an illusion of control by providing two favorable paths: pay me cash, or pay me in ownership. You also used their own words ("want to be an owner") to justify the massive 5x bump in your equity ask.',lesson:['When a startup uses "equity" to justify low pay, force them to value the equity mathematically.','Provide multiple acceptable options. It shifts the conversation from "Yes/No" to "Which one?"'],say:'"To make the math work at a ₹35L base, taking on that risk requires 0.5% equity. Alternatively, we can keep the 0.1% equity at the ₹50L market rate. Which works better for you?"'},
      ok:{verdict:'Solves the short term, misses the long term.',color:'ok',points:55,text:'A sign-on bonus is a valid way to bridge a cash gap without raising their fixed monthly payroll burn. However, it only solves the problem for year one. Next year, you are still stuck at a ₹35L base, making your next raise a monumental uphill battle.',lesson:['Sign-on bonuses bridge gaps, but they do not fix a broken base salary structure. If you take a 30% pay cut, you must receive massive upside (equity) to justify the risk.']},
      bad:{verdict:'You focused on your needs, not market value.',color:'bad',points:0,text:'The CEO does not care about your mortgage. Bringing personal financial needs into a corporate negotiation makes you sound desperate and removes your professional leverage. You also asked a closed "yes/no" question ("Is there any flexibility?"), which invites a hard "No."',lesson:['Never negotiate based on your personal budget. Negotiate based on market value and ROI.']}
    }
  },
  {
    tier: 2, tag:'sales', tagClass:'tag-sales', difficulty:5,
    title:'The Quarter-End Squeeze',
    context:'It is 3 PM on the last day of Q4. You need this ₹1.5 Crore deal to hit your annual quota. Procurement knows this. They call you.',
    them:{name:'Sanjay Gupta',role:'VP Procurement',bg:'#0F172A',fg:'#38BDF8',initials:'SG'},
    you:{name:'You',role:'Enterprise Rep',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'Listen, I have the contract open on my desk. I will sign it right now, today, if you knock 30% off the top. Otherwise, we push this evaluation to Q1 next year. Your call.'}],
    options:[
      {text:'"I can\'t do 30%, but I really want to get this done today. I can authorize 20% off if you sign by 5 PM."',quality:'bad',letter:'A'},
      {text:'"If we push to Q1, you lose the dedicated implementation team we reserved for Jan 1st. We can do a 10% discount today, or list price in Q1 with a March rollout. Which timeline works better for your operational targets?"',quality:'good',letter:'B'},
      {text:'"Sanjay, we\'ve been negotiating this for 3 months. The price we agreed on yesterday was final. I can\'t just drop 30% at the last minute."',quality:'ok',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Flipping the timeline risk.',color:'good',points:100,text:'Sanjay is weaponizing your deadline against you. By threatening the Jan 1st implementation (which his operational team desperately needs), you created a consequence for HIS delay. You offered a slight face-saving discount (10%) but shifted the leverage entirely back to the operational reality of the software.',lesson:['When procurement weaponizes your sales deadline, weaponize their implementation deadline right back.','Never let procurement think they have unlimited time. Create a cost for their delay.','Give them an illusion of control: "Sign today for X, or sign later for Y." Let them choose.'],say:'"If we push to Q1, you lose the Jan 1st implementation team. We can do 10% today, or list price in Q1 with a March rollout. Which timeline works better?"'},
      ok:{verdict:'Principled, but lacks leverage.',color:'ok',points:50,text:'Standing your ground is better than caving, but complaining about how long you\'ve been negotiating is a weak emotional plea. Procurement does not care about "fairness." By just saying no, you leave it entirely up to him whether the deal dies or not.',lesson:['"Fairness" is not a negotiation strategy in enterprise sales. You must create mechanical leverage (consequences) for their demands.']},
      bad:{verdict:'You proved their tactic works perfectly.',color:'bad',points:0,text:'You instantly panicked and offered a massive 20% discount (₹30 Lakhs!) just to save your quota. Sanjay just learned that high-pressure bullying works flawlessly on you. He will likely hold out for the full 30% now because you folded so easily.',lesson:['Never panic-discount at quarter-end. It destroys your margins and trains the client to abuse you on every future renewal.']}
    }
  },
  {
    tier: 2, tag:'partner', tagClass:'tag-partner', difficulty:4,
    title:'The Ultimatum',
    context:'A massive global distributor wants to resell your product. They promise to triple your revenue, but they send over a draconian term sheet.',
    them:{name:'Elena Rostova',role:'VP of Global Partnerships',bg:'#4C0519',fg:'#FB7185',initials:'ER'},
    you:{name:'You',role:'CEO, Apex CRM',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'We are ready to put our entire global salesforce behind your product. But to justify that investment, Section 4 requires a 3-year global exclusivity clause. You cannot sell through any other channel.'}],
    options:[
      {text:'"Global exclusivity completely kills our current multi-channel momentum. But we can offer exclusive rights to the Enterprise segment for 18 months, tied to a ₹10Cr minimum revenue guarantee."',quality:'good',letter:'A'},
      {text:'"We can\'t do global exclusivity, it\'s too risky for our board. What if we just do a standard non-exclusive reseller agreement with a higher commission tier for you?"',quality:'ok',letter:'B'},
      {text:'"If you can genuinely guarantee tripling our revenue, we are willing to sign the exclusivity clause to get this partnership launched."',quality:'bad',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Surgical segmentation.',color:'good',points:100,text:'When a whale demands exclusivity, they are pricing your opportunity cost at zero. By segmenting the exclusivity (to a specific sector/timeframe) and attaching a massive financial penalty (revenue guarantee), you grant their core wish (protection of their investment) while protecting your total addressable market.',lesson:['Never give blanket exclusivity. Segment it by geography, sector, or time.','Always tie exclusivity to a strict Minimum Revenue Guarantee. If they want to own your pipeline, they must pay for it.','Protect your downside risk in partnerships. Promises of "tripling revenue" are not legally binding.'],say:'"We can offer exclusive rights to the Enterprise segment for 18 months, tied to a ₹10Cr minimum revenue guarantee."'},
      ok:{verdict:'Safe, but likely kills the deal.',color:'ok',points:40,text:'Rejecting the extreme risk is smart, but offering a standard non-exclusive deal completely ignores her stated motivation ("to justify our investment"). A massive distributor won\'t train their salesforce on a product that their competitors can also sell. The deal will stall.',lesson:['You must solve the counterpart\'s underlying anxiety. They need protection from channel conflict; a standard agreement doesn\'t provide it.']},
      bad:{verdict:'A fatal corporate error.',color:'bad',points:0,text:'You just handed control of your entire company\'s revenue to a third party based on a verbal promise. If they fail to sell the product, you are legally barred from selling it yourself for 3 years. Your company will go bankrupt.',lesson:['Never trade legal exclusivity for verbal promises. If it\'s not a contractual revenue guarantee, it doesn\'t exist.']}
    }
  },
  {
    tier: 2, tag:'conflict', tagClass:'tag-conflict', difficulty:5,
    title:'The Hostile Renegotiation',
    context:'Midway through a 3-year contract, a massive client (20% of your total revenue) gets a new private-equity backed CFO who issues a ruthless mandate.',
    them:{name:'David Chen',role:'CFO',bg:'#2E1065',fg:'#C084FC',initials:'DC'},
    you:{name:'You',role:'CEO, Apex CRM',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'My mandate from the board is simple: cut operating costs by 20%. I am telling all our vendors: drop your pricing by 20% effective immediately, or we initiate a rip-and-replace to a cheaper competitor next quarter.'}],
    options:[
      {text:'"David, you are under a legally binding contract for another 18 months. We intend to hold you to those terms, and a rip-and-replace will cost you more in downtime than you save."',quality:'bad',letter:'A'},
      {text:'"I understand the mandate from your board. We can meet the 20% reduction in cash outflow by restructuring: we shift to upfront annual payments, extend the term by 2 years, and shift your tier to standard SLAs."',quality:'good',letter:'B'},
      {text:'"Losing you as a client would be tough. I can\'t do 20%, but I can get approval for a 10% reduction to help you hit your mandate without breaking our contract."',quality:'ok',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Elite variable expansion.',color:'good',points:100,text:'You validated his mandate, preventing an ego clash. Then, you used variable expansion: you traded a price reduction for massive structural benefits (upfront cash, longer lock-in, lower service costs). You gave him his 20% win to report to the board, while actually improving your own unit economics.',lesson:['When facing an aggressive mandate, don\'t fight the mandate—re-engineer how you achieve it.','Always trade price concessions for structural concessions (terms, upfront cash, SLAs).','Help the counterpart look good to their boss (the PE board) on their specific KPI (cash outflow).'],say:'"We can meet the 20% reduction by restructuring: we shift to upfront payments, extend the term by 2 years, and adjust your SLA tier."'},
      ok:{verdict:'A weak compromise that bleeds revenue.',color:'ok',points:30,text:'You offered a 10% discount for nothing in return. You just gave away pure margin because you were scared of his threat. Worse, David failed his 20% mandate, meaning he might still rip-and-replace you to hit his bonus.',lesson:['Never give unilateral concessions to aggressive threats. It rewards the behavior and weakens your positioning.']},
      bad:{verdict:'You invited a legal and operational war.',color:'bad',points:0,text:'Private equity CFOs do not care about your contract; they have lawyers for that. By challenging him and acting defensively, you turned a financial mandate into a hostile standoff. He will dedicate his team to finding a loophole to break the contract just to spite you.',lesson:['Legal threats are the absolute last resort. Use them and you permanently destroy the relationship.']}
    }
  },
  {
    tier: 2, tag:'talent', tagClass:'tag-salary', difficulty:4,
    title:'The Poached Executive',
    context:'Your lead engineer, who is critical to an upcoming launch, walks into your office. A well-funded rival just offered to double their salary.',
    them:{name:'Rahul Desai',role:'Lead Engineer',bg:'#171717',fg:'#D4D4D8',initials:'RD'},
    you:{name:'You',role:'CTO',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'I wasn\'t looking, but TechCorp reached out. They offered me ₹80L to be their VP of Engineering. I love it here, but I can\'t ignore that kind of money. Can you match it?'}],
    options:[
      {text:'"If this is purely about immediate cash, I can\'t match a 100% bump. But usually when someone looks around, something here is missing. What is the new role offering that you aren\'t getting here?"',quality:'good',letter:'A'},
      {text:'"I can\'t match ₹80L, but I can bump you to ₹55L and give you some more equity to keep you through the launch."',quality:'ok',letter:'B'},
      {text:'"That\'s a massive offer, but you are critical to our launch next month. If you leave now, it\'s going to really hurt the team. I need you to stay at least until Q3."',quality:'bad',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Surgical discovery.',color:'good',points:100,text:'You set a firm boundary on the cash immediately, preventing a bidding war you can\'t win. Then, you pivoted to the emotional and career drivers. He didn\'t just get offered money; he got offered a "VP" title. If you uncover that he craves leadership or autonomy, you can restructure his role here to match the *feeling* of the offer, even if you can\'t match the cash.',lesson:['Never enter a bidding war against a better-funded rival. You will lose the war, or break your comp structure.','People rarely leave *purely* for money. Dig for the underlying push/pull factors (title, autonomy, burnout, respect).','Label the unspoken dynamics to get them talking. "Usually when someone looks around..."'],say:'"If it is purely about cash, I cannot match a 100% bump. But usually, something here is missing. What is the new role offering that you aren\'t getting here?"'},
      ok:{verdict:'An expensive band-aid.',color:'ok',points:40,text:'You offered a ₹15L raise and equity without solving the root issue. If he leaves anyway, you look weak. If he stays, he will likely leave in 6 months when the next big offer comes, because you didn\'t fix whatever made him take the interview in the first place.',lesson:['Throwing money at a retention problem without doing discovery is just renting the employee for a few more months.']},
      bad:{verdict:'Emotional guilt-tripping.',color:'bad',points:0,text:'Guilt-tripping an employee about "hurting the team" is manipulative and unprofessional. He owes you the work he is paid for, not a lifetime loyalty oath. He will leave immediately and tell everyone else on the team how toxic the management is.',lesson:['Never use guilt or "the team" as leverage in a professional compensation discussion.']}
    }
  },
  {
    tier: 2, tag:'legal', tagClass:'tag-vendor', difficulty:5,
    title:'The Ransomware Liability',
    context:'A major client suffers a data breach. They claim your API was the vulnerability and are threatening a massive lawsuit that could sink your company.',
    them:{name:'Sarah Jenkins',role:'General Counsel, Client Corp',bg:'#1E1B4B',fg:'#818CF8',initials:'SJ'},
    you:{name:'You',role:'CEO, Apex CRM',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'Our internal IT flagged your API as the breach point. We are holding you fully liable for the ₹10 Crore in damages and regulatory fines. Our litigators are preparing the filings.'}],
    options:[
      {text:'"Our system logs show zero anomalous activity on our end. Your internal IT is likely trying to scapegoat us for their own firewall failure. Go ahead and sue us, we will countersue."',quality:'bad',letter:'A'},
      {text:'"Before we discuss liability and legal filings, our mutual priority must be securing the perimeter. Let\'s get a joint, privileged third-party forensics firm to establish the objective facts. We will cover the audit cost."',quality:'good',letter:'B'},
      {text:'"We take this very seriously and are so sorry this happened. We are willing to refund your annual contract and assist your team however we can to avoid litigation."',quality:'ok',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Elite crisis de-escalation.',color:'good',points:100,text:'You ignored the aggressive threat and pivoted entirely to a shared objective (securing the perimeter). By offering to pay for a *privileged* third-party forensic audit, you removed their internal IT\'s bias, protected the findings under legal privilege, and bought yourself crucial time without admitting any fault.',lesson:['In a crisis, immediately pivot from assigning blame to a shared, urgent objective (e.g., stopping the bleeding).','Never accept the counterpart\'s internal data as objective fact in a high-stakes liability dispute.','Offer a neutral process (third-party audit) to de-escalate aggressive legal posturing.'],say:'"Before we discuss liability, our priority must be securing the perimeter. Let\'s get a joint, privileged third-party forensics firm to establish the objective facts."'},
      ok:{verdict:'A dangerous admission of guilt.',color:'ok',points:30,text:'Apologizing and offering a refund in the face of a ₹10Cr legal threat will be used by their lawyers as an implicit admission of liability. You tried to be nice, but you just handed their litigators exactly what they need to destroy you.',lesson:['Never apologize or offer financial compensation during an active liability dispute until the facts are established.']},
      bad:{verdict:'Ego-driven escalation.',color:'bad',points:0,text:'Attacking their IT team and daring them to sue you guarantees a massive, public, expensive lawsuit. Even if you are right and win the lawsuit, the legal fees and public PR damage will bankrupt your startup.',lesson:['Never dare a corporate General Counsel to sue you. They have an unlimited legal budget; you do not.']}
    }
  },
  {
    tier: 2, tag:'sales', tagClass:'tag-sales', difficulty:4,
    title:'The Whale Demands Custom Code',
    context:'A massive, logo-making enterprise client (e.g., Tata/Reliance) will sign a ₹5Cr contract, but ONLY if you build a highly specific, proprietary module just for them.',
    them:{name:'Amitabh Ray',role:'Head of Digital Transformation',bg:'#064E3B',fg:'#34D399',initials:'AR'},
    you:{name:'You',role:'Founder, Apex CRM',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'We are ready to move forward with the ₹5Cr rollout. However, we need you to build a custom inventory-routing module that integrates with our legacy AS400 mainframe. If you can\'t do that, we have to go with an agency.'}],
    options:[
      {text:'"We are a SaaS product, not a dev shop. We won\'t build custom one-off code as it breaks our core architecture. However, we will accelerate this feature on our roadmap if you fund the NRE (Non-Recurring Engineering) cost, and we will grant you a 2-year exclusive on that module."',quality:'good',letter:'A'},
      {text:'"That integration is totally outside our scope, and frankly, AS400 is ancient technology. You really need to modernize your backend rather than asking us to build custom code for it."',quality:'bad',letter:'B'},
      {text:'"It\'s a big ask, but for a ₹5Cr contract, we can allocate an engineering pod to build that custom integration for you before launch."',quality:'ok',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Protecting the product vision.',color:'good',points:100,text:'You held a firm boundary ("We are a SaaS product") while providing a collaborative path forward. By charging NRE (Non-Recurring Engineering) costs and maintaining ownership of the code, you get paid to build a feature you can eventually sell to others. Giving them a 2-year exclusive satisfies their ego and need for competitive advantage.',lesson:['Never turn your SaaS startup into a custom dev agency just to close a whale. It creates unmaintainable tech debt.','If an enterprise demands custom features, make them pay the R&D costs (NRE) and retain the IP.','Trade temporary exclusivity for funding your roadmap.'],say:'"We won\'t build custom one-off code as it breaks our core architecture. However, we will accelerate this feature on our roadmap if you fund the NRE cost."'},
      ok:{verdict:'The tech-debt trap.',color:'ok',points:40,text:'You secured the ₹5Cr, but you just doomed your engineering team. Maintaining a custom integration to a legacy mainframe for one specific client will drain your resources for years. You compromised your product architecture for short-term revenue.',lesson:['Bending your core architecture for one client destroys your ability to scale as a software company.']},
      bad:{verdict:'Arrogant and insulting.',color:'bad',points:0,text:'Insulting an enterprise executive\'s legacy tech stack ("ancient technology") is a surefire way to get thrown out of the room. They know it\'s old; that\'s why they are trying to buy your software to fix it. You lost a massive deal due to pure ego.',lesson:['Never insult a prospect\'s existing infrastructure. Empathize with their technical debt; don\'t mock it.']}
    }
  },

  // TIER 3: THE EXECUTIVE BOARDROOM
  {
    tier: 3, tag:'m&a', tagClass:'tag-ma', difficulty:5,
    title:'The M&A Lowball',
    context:'Your startup is at ₹50Cr ARR. A massive tech giant approaches for acquisition. Initial whispers were a ₹400Cr valuation. The official LOI comes in devastatingly low.',
    them:{name:'Marcus Vance',role:'VP Corporate Development',bg:'#171717',fg:'#D4D4D8',initials:'MV'},
    you:{name:'You',role:'CEO & Founder',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'Market headwinds are brutal right now. Tech multiples have compressed. We are officially offering ₹150Cr. It is a very clean, all-cash offer. We need an answer by Friday.'}],
    options:[
      {text:'"That is insulting. We were expecting ₹400Cr based on early conversations. If you can\'t get closer to ₹350Cr, we have nothing to discuss."',quality:'bad',letter:'A'},
      {text:'"We are not running a process to sell. If we were valued solely on current standalone ARR multiples, we would stay independent. To make sense for our board, this needs to be priced on the revenue synergy this unlocks for your enterprise segment."',quality:'good',letter:'B'},
      {text:'"I appreciate the offer, but ₹150Cr is tough to swallow given our growth rate. Can you walk me through exactly the math and multiples your team used to arrive at that number?"',quality:'ok',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Elite frame control.',color:'good',points:100,text:'The lowball is an anchor designed to test your desperation. By stating "we are not running a process," you instantly communicate you have no need to sell. More importantly, you fundamentally shifted the valuation framework: from *your standalone multiple* to *their synergy upside*.',lesson:['The anchoring effect in M&A is designed to manipulate your board\'s expectations. Never react emotionally.','Shift the valuation framework. Don\'t argue about your multiple; argue about the value you unlock inside their ecosystem.','"We are not for sale" is the most powerful negotiation stance in M&A.'],say:'"If we were valued solely on current standalone ARR multiples, we would stay independent. This needs to be priced on the revenue synergy this unlocks for your enterprise segment."'},
      ok:{verdict:'Logical, but plays their game.',color:'ok',points:50,text:'Asking them to explain their math is a standard tactic. However, Corp Dev teams are masters at financial modeling; they will easily justify the ₹150Cr with a dozen bearish market charts. You are fighting them on their home turf (spreadsheet math) instead of changing the premise.',lesson:['Never argue the math of an extreme anchor. Reject the premise entirely. If you argue their math, you validate their framework.']},
      bad:{verdict:'Emotional and amateurish.',color:'bad',points:0,text:'Calling an offer "insulting" screams amateur. Worse, you instantly countered with ₹350Cr, effectively capping your upside and proving that their lowball anchor successfully dragged your price down by ₹50Cr before negotiations even started.',lesson:['Never take a business anchor personally. Never counter-anchor downward immediately.']}
    }
  },
  {
    tier: 3, tag:'board', tagClass:'tag-board', difficulty:5,
    title:'The Series B Cram-down',
    context:'Your startup is running out of cash. Your lead VC offers a term sheet to save the company, but it contains aggressive, founder-punishing terms.',
    them:{name:'Sarah Collins',role:'Partner, Apex Ventures',bg:'#451A03',fg:'#FBBF24',initials:'SC'},
    you:{name:'You',role:'CEO & Founder',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'We will lead the ₹40Cr extension round to keep the lights on. But given the high risk, we require a 3x Participating Preferred liquidation preference.'}],
    options:[
      {text:'"A 3x participating preference destroys the management team\'s incentive to build for any exit under ₹300Cr. We need a clean 1x non-participating preference to keep the team aligned with your upside."',quality:'good',letter:'A'},
      {text:'"I can live with the 3x preference if we have to, but we really need a higher valuation on the headline number so the team doesn\'t feel like this is a down-round."',quality:'bad',letter:'B'},
      {text:'"That\'s a really aggressive structure. Could we compromise at a 2x Non-Participating preference?"',quality:'ok',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Protecting the true economics.',color:'good',points:100,text:'A 3x Participating Preferred means the VC gets 3x their money back *first*, and then *still* takes their percentage of whatever is left. It wipes out founders in an average exit. By explaining that this misaligns incentives (destroying motivation), you make a business case against it, not just a selfish one.',lesson:['In venture capital, the structure (liquidation preferences, ratchets) is vastly more dangerous than the valuation.','"Participating preferred" is a double-dip mechanism. Fight it aggressively.','Frame your pushback around alignment: "If we don\'t have upside, we won\'t work 100-hour weeks to make you rich."'],say:'"A 3x participating preference destroys the management team\'s incentive. We need a clean 1x non-participating preference to keep the team aligned with your upside."'},
      ok:{verdict:'A painful compromise.',color:'ok',points:40,text:'Dropping the "participating" clause is good, but accepting a 2x preference still means you have to build a massively successful company just to break even on this round. You anchored yourself to their punishing framework instead of holding the line at standard market terms (1x).',lesson:['Splitting the difference on draconian legal terms still leaves you with draconian legal terms.']},
      bad:{verdict:'Vanity over sanity.',color:'bad',points:0,text:'You traded actual economic reality (the liquidation preference) for a vanity metric (the headline valuation). When the company sells, the VC will take all the cash, and you will get nothing, but hey—you got to tell TechCrunch you had a high valuation.',lesson:['Never trade structural economics for vanity valuations. The preference stack dictates who actually gets paid.']}
    }
  },
  {
    tier: 3, tag:'board', tagClass:'tag-board', difficulty:5,
    title:'The Co-Founder Hostage Crisis',
    context:'You and a technical co-founder built a startup. You did the sales; he wrote the MVP. He owns 40%. Just before a massive Series A closes, he halts the deal.',
    them:{name:'Amit Patel',role:'Technical Co-founder',bg:'#0F172A',fg:'#38BDF8',initials:'AP'},
    you:{name:'You',role:'Business Co-founder',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'I\'m not signing the IP assignment docs for the VC. I built the entire core product while you just sent emails. I want my equity bumped to 60%, and I want CEO title, or I walk away and take the code with me.'}],
    options:[
      {text:'"You are extorting the company. We have a signed operating agreement. If you don\'t sign by Friday, I will sue you for breach of fiduciary duty and replace you."',quality:'bad',letter:'A'},
      {text:'"The VC requires clean IP to fund us next week. If you block this, the term sheet is pulled, the company goes insolvent next month, and your 40% is worth zero. I have ₹50L authorized to buy you out cleanly today. Your call."',quality:'good',letter:'B'},
      {text:'"Amit, I hear that you feel undervalued for building the MVP. What if we do a 50/50 split and make you Co-CEO so we can just get this funding closed?"',quality:'ok',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Ruthless leverage application.',color:'good',points:100,text:'Amit is acting irrationally based on ego. You clearly laid out the mechanical reality: if he blocks, the company dies, and his equity becomes worthless. You removed his perceived leverage (the code) by showing that the code has zero value without the VC funding. You then offered a golden bridge (₹50L buyout) for him to exit saving face.',lesson:['When facing irrational extortion, do not argue fairness. Map out the bleak, mechanical reality of their threat.','Show them that shooting the hostage (the company) kills them too.','Always offer a clean, concrete exit path (a buyout) when dealing with a toxic founder.'],say:'"If you block this, the term sheet is pulled, the company goes insolvent, and your 40% is worth zero. I have ₹50L authorized to buy you out cleanly today. Your call."'},
      ok:{verdict:'Rewarding terrorism.',color:'ok',points:20,text:'You gave up 10% of the company and a Co-CEO title purely because he threw a tantrum and held the company hostage. The VC will see this chaotic cap-table change, realize the founders are unstable, and likely pull the term sheet anyway.',lesson:['Never permanently destroy your cap table and governance structure to appease a temporary hostage situation.']},
      bad:{verdict:'Mutually assured destruction.',color:'bad',points:0,text:'Lawsuits take years. The VC funding closes next week. If you sue him, the VC will instantly walk away from the mess, the company will run out of money, and you will spend the next three years fighting in court over a bankrupt shell.',lesson:['Threatening a lawsuit when you have no time or money is an empty threat that only ensures the destruction of the company.']}
    }
  },
  {
    tier: 3, tag:'legal', tagClass:'tag-vendor', difficulty:5,
    title:'The Bait and Switch',
    context:'You are acquiring a distressed competitor\'s assets for ₹10Cr. At the final closing table, the seller\'s lawyer suddenly alters the terms.',
    them:{name:'Jonathan Reed',role:'Seller\'s Attorney',bg:'#4C0519',fg:'#FB7185',initials:'JR'},
    you:{name:'You',role:'Acquiring CEO',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'My client has decided that the proprietary algorithms are not included in the ₹10Cr asset purchase. We will license them back to you for an additional ₹2Cr annually. Sign here.'}],
    options:[
      {text:'"The original LOI explicitly included all IP. We are proceeding with the ₹10Cr closing today, but I am instructing the escrow agent to hold back ₹3Cr until the algorithms are fully transferred to our servers as originally agreed."',quality:'good',letter:'A'},
      {text:'"This is completely bad faith. You are trying to change the deal at the 11th hour. We are walking away from this acquisition immediately."',quality:'ok',letter:'B'},
      {text:'"We really need those algorithms for this acquisition to make sense. We can\'t do ₹2Cr annually, but what if we pay a flat ₹1Cr one-time fee to keep them included?"',quality:'bad',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Enforcing the contract mechanically.',color:'good',points:100,text:'The 11th-hour "nibble" is a classic aggressive tactic relying on your deal fatigue. You did not get angry or threaten to walk. You simply stated the mechanical reality: the deal closes, but the money does not transfer until the asset does. You used the escrow agent as the enforcer.',lesson:['Never react emotionally to a last-minute "nibble."','Use mechanical enforcers (like an escrow holdback) to punish bad faith behavior without blowing up the entire deal.','Hold the line on the agreed-upon terms as if it is a simple matter of administrative fact.'],say:'"The LOI included all IP. We are proceeding with closing, but instructing escrow to hold back ₹3Cr until the algorithms are transferred."'},
      ok:{verdict:'Walking away gives them the power.',color:'ok',points:40,text:'Walking away from a bad-faith actor is a valid strategy, but you likely spent months and massive legal fees getting to this closing table. By storming out, you let their bluff ruin your acquisition strategy.',lesson:['Walking away is a powerful tool, but it should be a calm, calculated decision, not an emotional reaction to a cheap trick.']},
      bad:{verdict:'You fell for the trap.',color:'bad',points:0,text:'You just paid ₹1 Crore extra for something you already negotiated and owned in the LOI. The opposing lawyer now knows you are highly susceptible to last-minute pressure and will likely try to extract more concessions before the ink is dry.',lesson:['Never pay twice for the same asset. Conceding to an 11th-hour bait-and-switch guarantees you will be bled dry.']}
    }
  },
  {
    tier: 3, tag:'board', tagClass:'tag-board', difficulty:5,
    title:'The Boardroom Coup',
    context:'Your startup missed revenue targets for two quarters. At the board meeting, your Series A lead investor makes a move.',
    them:{name:'Richard Croft',role:'Board Member / Lead VC',bg:'#1E1B4B',fg:'#818CF8',initials:'RC'},
    you:{name:'You',role:'CEO & Founder',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'We love your product vision, but the go-to-market execution is failing. The board believes we need to bring in an external "Scale CEO" to take over. We want you to step down to Chief Product Officer.'}],
    options:[
      {text:'"This is my company. I hold the common stock majority. If you try to force me out, I will tie this board up in litigation for years and burn the company to the ground."',quality:'bad',letter:'A'},
      {text:'"I agree the GTM execution has missed the mark. But replacing a founder mid-pivot creates massive instability. Give me one more quarter with the new VP of Sales; if we miss targets again, I will personally lead the search for a new CEO."',quality:'good',letter:'B'},
      {text:'"I understand the concern. If the board truly believes an external CEO is required, I will step aside, provided my equity accelerates vesting and I maintain my board seat."',quality:'ok',letter:'C'}
    ],
    analysis:{
      good:{verdict:'Buying time and taking ownership.',color:'good',points:100,text:'You neutralized the attack by immediately agreeing with their underlying premise (GTM is failing), completely disarming their main argument. Then, you offered a clear, time-bound alternative that keeps you in control while giving them a guaranteed fallback (you leading the search).',lesson:['When the board attacks your performance, never deny reality. Own the failure, then present the turnaround plan.','"Give me X time; if it fails, I will execute your plan" is the strongest way to survive a boardroom coup.','Never get defensive; speak to the board as a rational shareholder protecting the asset.'],say:'"I agree GTM execution has missed. Give me one more quarter with the new VP; if we miss again, I will personally lead the search for a new CEO."'},
      ok:{verdict:'An honorable surrender.',color:'ok',points:50,text:'If you genuinely believe you cannot scale the company, negotiating a graceful exit with accelerated vesting is a smart, mature move. However, you folded at the first sign of pressure without attempting to defend your leadership or propose a turnaround.',lesson:['Negotiating your exit terms is smart, but doing it immediately signals you already gave up on the company.']},
      bad:{verdict:'Scorched earth destruction.',color:'bad',points:0,text:'Throwing a temper tantrum and threatening to destroy the company proves to the board that you are far too immature to be the CEO. They will instantly fire you for cause (violating fiduciary duty), and you will likely lose all unvested equity.',lesson:['Never threaten your own company. Board members have seen founder meltdowns a hundred times; they have legal playbooks specifically to destroy you if you try this.']}
    }
  },
  {
    tier: 3, tag:'legal', tagClass:'tag-vendor', difficulty:5,
    title:'The IP Patent Troll',
    context:'You are 3 months away from a highly anticipated IPO. A notorious patent troll files a massive infringement lawsuit against your core tech.',
    them:{name:'Arthur Vance',role:'Plaintiff Attorney',bg:'#451A03',fg:'#FBBF24',initials:'AV'},
    you:{name:'You',role:'CEO',bg:'#4F46E5',fg:'#fff',initials:'YO'},
    chat:[{speaker:'them',text:'Your entire routing algorithm infringes on our 2014 patent. We know you are trying to IPO soon. We will settle this quietly today for ₹15 Crore and grant you a perpetual license. Otherwise, we file an injunction.'}],
    options:[
      {text:'"We have engaged top-tier IP litigators. Your patent is overly broad and prior art exists. We will not be extorted. See you in court."',quality:'ok',letter:'A'},
      {text:'"An injunction would undoubtedly delay our IPO. We can\'t do ₹15Cr, but we can authorize a ₹5Cr nuisance settlement to make this go away right now."',quality:'bad',letter:'B'},
      {text:'"We are fully prepared to litigate and invalidate your patent via prior art. However, avoiding the distraction during the IPO roadshow has a specific internal value to us. We will offer a one-time ₹1.5Cr nuisance fee to dismiss with prejudice, valid for 48 hours."',quality:'good',letter:'C'}
    ],
    analysis:{
